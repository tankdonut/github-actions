name: "pre-commit"
description: "Execute pre-commit hooks"
author: "tankdonut"

inputs:
  extra_args:
    description: "Extra arguments to pass to pre-commit"
    required: false
    default: ""
  skip_hooks:
    description: "Space-separated list of hooks to skip"
    required: false
    default: ""
  asdf_dir:
    description: "Path to asdf installation directory for caching"
    required: false
    default: "~/.asdf"
  install_uv_deps:
    description: "Whether to install Python dependencies via uv sync"
    required: false
    default: "false"
  uv_sync_args:
    description: "Arguments to pass to uv sync (e.g. --group dev --frozen)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Cache asdf Tools
      if: hashFiles('.tool-versions') != ''
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: cache-asdf
      with:
        path: ${{ inputs.asdf_dir }}
        key: asdf-cache-${{ runner.os }}-${{ hashFiles('.tool-versions') }}

    - name: Install Dependencies via asdf
      if: hashFiles('.tool-versions') != '' && steps.cache-asdf.outputs.cache-hit != 'true'
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Check if UV is managed by asdf
      if: inputs.install_uv_deps == 'true'
      id: check-uv
      shell: bash
      run: |
        if [ -f .tool-versions ] && grep -q '^uv ' .tool-versions; then
          echo "in_tool_versions=true" >> "$GITHUB_OUTPUT"
        else
          echo "in_tool_versions=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up UV
      if: inputs.install_uv_deps == 'true' && steps.check-uv.outputs.in_tool_versions != 'true'
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Install Dependencies via UV
      if: inputs.install_uv_deps == 'true'
      shell: bash
      run: uv sync ${{ inputs.uv_sync_args }}

    - name: Execute pre-commit
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
      with:
        extra_args: "${{ inputs.extra_args != '' && inputs.extra_args || '--all-files' }}${{ inputs.skip_hooks != '' && format(' --skip {0}', inputs.skip_hooks) || '' }}"
