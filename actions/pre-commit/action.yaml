name: "pre-commit"
description: "Execute pre-commit hooks"
author: "tankdonut"

inputs:
  extra_args:
    description: "Extra arguments to pass to pre-commit"
    required: false
    default: ""
  skip_hooks:
    description: "Space-separated list of hooks to skip"
    required: false
    default: ""
  asdf_dir:
    description: "Path to asdf installation directory for caching"
    required: false
    default: "~/.asdf"
  install_uv_deps:
    description: "Whether to install Python dependencies via uv sync"
    required: false
    default: "false"
  uv_sync_args:
    description: "Arguments to pass to uv sync (e.g. --group dev --frozen)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install asdf dependencies
      uses: ./actions/install-asdf-dependencies
      with:
        asdf_dir: ${{ inputs.asdf_dir }}

    - name: Check if UV is managed by asdf
      if: inputs.install_uv_deps == 'true'
      id: check-uv
      shell: bash
      run: |
        if [ -f .tool-versions ] && grep -q '^uv ' .tool-versions; then
          echo "in_tool_versions=true" >> "$GITHUB_OUTPUT"
        else
          echo "in_tool_versions=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up UV
      if: inputs.install_uv_deps == 'true' && steps.check-uv.outputs.in_tool_versions != 'true'
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

    - name: Install Dependencies via UV
      if: inputs.install_uv_deps == 'true'
      shell: bash
      run: uv sync ${{ inputs.uv_sync_args }}

    - name: Cache pre-commit hooks
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.tool-versions', '.pre-commit-config.yaml') }}

    - name: Execute pre-commit
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
      with:
        extra_args: "${{ inputs.extra_args != '' && inputs.extra_args || '--all-files' }}${{ inputs.skip_hooks != '' && format(' --skip {0}', inputs.skip_hooks) || '' }}"
