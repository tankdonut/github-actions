name: "pre-commit"
description: "Execute pre-commit hooks"
author: "tankdonut"

inputs:
  extra_args:
    description: "Extra arguments to pass to pre-commit"
    required: false
    default: ""
  skip_hooks:
    description: "Space-separated list of hooks to skip"
    required: false
    default: ""
  asdf_dir:
    description: "Path to asdf installation directory for caching"
    required: false
    default: "~/.asdf"

runs:
  using: "composite"
  steps:
    - name: Cache asdf Tools
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: cache-asdf
      with:
        path: ${{ inputs.asdf_dir }}
        key: asdf-cache-${{ runner.os }}-${{ hashFiles('.tool-versions') }}

    - name: Install Dependencies via asdf
      if: steps.cache-asdf.outputs.cache-hit != 'true'
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1

    - name: Execute pre-commit
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
      with:
        extra_args: "${{ inputs.extra_args != '' && inputs.extra_args || '--all-files' }}${{ inputs.skip_hooks != '' && format(' --skip {0}', inputs.skip_hooks) || '' }}"
