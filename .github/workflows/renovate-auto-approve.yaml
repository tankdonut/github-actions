name: Renovate Auto-Approve

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

# Prevent concurrent approvals on the same PR.
concurrency:
  group: renovate-auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  pull-requests: write

jobs:
  approve:
    # Only approve non-draft PRs opened by Renovate. Drafts (e.g. major bumps)
    # remain pending human review until marked ready.
    if: |
      github.event.pull_request.draft == false &&
      (github.actor == 'renovate[bot]' || github.actor == 'renovate-config[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Verify AUTO_APPROVE_PAT secret is configured
        env:
          AUTO_APPROVE_PAT: ${{ secrets.AUTO_APPROVE_PAT }}
        run: |
          if [ -z "$AUTO_APPROVE_PAT" ]; then
            echo "::error::Secret 'AUTO_APPROVE_PAT' is not set. Configure it under repo Settings → Secrets and variables → Actions with a token carrying pull_request:write scope."
            exit 1
          fi
      - name: Approve Renovate pull request
        uses: hmarr/auto-approve-action@f0939ea97e9205ef24d872e76833fa908a770363 # v4.0.0
        with:
          github-token: ${{ secrets.AUTO_APPROVE_PAT }}
          review-message: >
            Auto-approved by Renovate Auto-Approve workflow.
            Merge is gated by required status checks via GitHub Auto-Merge.
